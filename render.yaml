services:
  - type: web
    name: sistema-semaforos
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: MAPAS_API_URL
        value: https://tecnologia-atkj.onrender.com/api/mapas
